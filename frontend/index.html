<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Rally</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      /* Splash screen while app loads */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #000000;
        transition: opacity 0.5s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      #splash img { width: 120px; height: 120px; animation: pulse-glow 2s ease-in-out infinite; }
      #splash .brand { font-family: 'Rajdhani', sans-serif; font-size: 48px; font-weight: 700; color: #00D9FF; margin-top: 16px; letter-spacing: 8px; text-transform: uppercase; }
      #splash .loading { margin-top: 24px; width: 200px; height: 3px; background: #0A0E27; border-radius: 2px; overflow: hidden; }
      #splash .loading-bar { height: 100%; background: linear-gradient(90deg, #00D9FF, #39FF14); animation: loading 1.5s ease-in-out infinite; }
      @keyframes pulse-glow { 0%, 100% { filter: drop-shadow(0 0 10px rgba(0,217,255,0.3)); } 50% { filter: drop-shadow(0 0 30px rgba(0,217,255,0.6)); } }
      @keyframes loading { 0% { width: 0; margin-left: 0; } 50% { width: 100%; margin-left: 0; } 100% { width: 0; margin-left: 100%; } }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/icon.png" alt="Rally" />
      <div class="brand">Rally</div>
      <div class="loading"><div class="loading-bar"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
